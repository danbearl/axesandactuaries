name: Deploy to Fly.io

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  verify:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: adventurer
          POSTGRES_PASSWORD: adventurer
          POSTGRES_DB: adventurer_manager_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U adventurer"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://adventurer:adventurer@localhost:5432/adventurer_manager_test
    steps:
      - uses: actions/checkout@v6

      # pnpm version comes from the "packageManager" field in package.json.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # tsc --noEmit for packages/api needs the generated @prisma/client types.
      # Doesn't need DATABASE_URL: generate only reads the schema file.
      - run: pnpm --filter @adventurer-manager/api exec prisma generate

      - run: pnpm typecheck

      - name: Migrate test database
        run: pnpm --filter @adventurer-manager/api exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://adventurer:adventurer@localhost:5432/adventurer_manager_test

      - run: pnpm test

  deploy:
    name: Deploy
    needs: verify
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v6

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: |
          flyctl deploy \
            --build-arg VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }} \
            --build-arg VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }} \
            --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
