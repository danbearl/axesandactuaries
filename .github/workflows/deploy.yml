name: Deploy to Fly.io

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  verify:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: adventurer
          POSTGRES_PASSWORD: adventurer
          POSTGRES_DB: adventurer_manager_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U adventurer"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://adventurer:adventurer@localhost:5432/adventurer_manager_test
    steps:
      - uses: actions/checkout@v6

      # pnpm version comes from the "packageManager" field in package.json.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # tsc --noEmit for packages/api needs the generated @prisma/client types.
      # Doesn't need DATABASE_URL: generate only reads the schema file.
      - run: pnpm --filter @axes-actuaries/api exec prisma generate

      - run: pnpm typecheck

      - name: Migrate test database
        run: pnpm --filter @axes-actuaries/api exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://adventurer:adventurer@localhost:5432/adventurer_manager_test

      - run: pnpm test

  deploy:
    name: Deploy
    needs: verify
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: true

    steps:
      # fetch-depth: 0 (full history), not the default shallow clone — the deploy-summary
      # step below needs `git log` to walk from github.event.before, which a depth-1 clone
      # wouldn't have.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: |
          flyctl deploy \
            --build-arg VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }} \
            --build-arg VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }} \
            --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # Nice-to-have, not required for a successful deploy: posts a draft announcement
      # summarizing commits since the last deploy, for an admin to review/clean up and
      # publish via the Announcements page — never auto-published (see
      # routes/announcements.ts's /webhook handler). continue-on-error so a hiccup here
      # (e.g. secret not yet configured, transient network failure) never fails a deploy
      # that already succeeded.
      - name: Post deploy summary announcement
        continue-on-error: true
        env:
          WEBHOOK_SECRET: ${{ secrets.ANNOUNCEMENTS_WEBHOOK_SECRET }}
        run: |
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            # First push to the branch, or a force-push with no known prior SHA — fall back
            # to a bounded recent-history window instead of the full since-last-deploy range.
            COMMITS=$(git log -20 --no-merges --pretty=format:'- %s')
          else
            COMMITS=$(git log "$BEFORE"..HEAD --no-merges --pretty=format:'- %s')
          fi

          if [ -z "$COMMITS" ]; then
            echo "No commits to summarize — skipping announcement."
            exit 0
          fi
          if [ -z "$WEBHOOK_SECRET" ]; then
            echo "ANNOUNCEMENTS_WEBHOOK_SECRET not set — skipping announcement."
            exit 0
          fi

          TITLE_JSON=$(printf 'Deploy update — %s' "$(date -u +%Y-%m-%d)" | jq -Rs .)
          BODY_JSON=$(printf '%s' "$COMMITS" | jq -Rs .)

          curl --fail-with-body -sS -X POST https://axesandactuaries.com/api/v1/announcements/webhook \
            -H "Authorization: Bearer $WEBHOOK_SECRET" \
            -H "Content-Type: application/json" \
            -d "{\"title\": ${TITLE_JSON}, \"body\": ${BODY_JSON}}"
