# fly.toml — Axes & Actuaries
# Replace "axes-actuaries" below with your actual Fly app name if different.
# Create the app first: fly apps create axes-actuaries

app = "axes-actuaries"
primary_region = "iad"

[build]

[deploy]
  # Runs in the same image before new instances start — safe for schema migrations
  release_command = "packages/api/node_modules/.bin/prisma migrate deploy --schema packages/api/prisma/schema.prisma"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
